<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOARBAUR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--deep-brown:#2C1A10;--warm-brown:#4A3028;--champagne-gold:#C9A96E;--pale-gold:#D4B886;--ivory:#F5F0E8;--warm-cream:#EDE5D8;--stone:#D4C9B5;--text-dark:#1A0E08;--text-soft:#6B5D50;--ease-out-expo:cubic-bezier(0.16,1,0.3,1);--nav-height:5rem}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background-color:var(--ivory);color:var(--text-dark);line-height:1.7;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
.container{max-width:1280px;margin:0 auto;padding:0 2rem}
@media(max-width:768px){.container{padding:0 1.25rem}}
.reveal{opacity:0;transform:translateY(2.5rem);transition:opacity 0.9s var(--ease-out-expo),transform 0.9s var(--ease-out-expo)}
.reveal.revealed{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:0.1s}.reveal-delay-2{transition-delay:0.2s}.reveal-delay-3{transition-delay:0.3s}.reveal-delay-4{transition-delay:0.4s}

.nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:var(--nav-height);display:flex;align-items:center;justify-content:center;padding:0 2rem;transition:background-color 0.5s var(--ease-out-expo),box-shadow 0.5s var(--ease-out-expo);background:transparent}
.nav.scrolled{background:rgba(28,10,5,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 1px 0 rgba(201,169,110,0.12)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1280px}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{font-size:0.8125rem;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--ivory);transition:color 0.3s ease;position:relative}
.nav-links a::after{content:"";position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--champagne-gold);transition:width 0.35s var(--ease-out-expo)}
.nav-links a:hover{color:var(--champagne-gold)}
.nav-links a:hover::after{width:100%}
.nav-logo{position:absolute;left:50%;transform:translateX(-50%);font-family:"Playfair Display",serif;font-size:1.625rem;font-weight:700;letter-spacing:0.3em;color:var(--ivory);transition:color 0.5s ease}
@media(max-width:768px){.nav-links.left-links{display:none}.nav-links.right-links{display:none}.nav-links{gap:1rem}}

.hero{position:relative;height:100vh;min-height:700px;display:flex;align-items:center;justify-content:center;overflow:hidden;background-color:var(--deep-brown)}
.hero-bg{position:absolute;inset:-10% -10%;background-image:url('images/hero-male.jpg');background-size:cover;background-position:center 40%;will-change:transform;transform:translateZ(0)}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(20,8,4,0.55) 0%,rgba(20,8,4,0.3) 40%,rgba(20,8,4,0.7) 100%)}
.hero-content{position:relative;z-index:2;text-align:center;max-width:800px;padding:0 2rem}
.hero-tag{display:inline-block;font-size:0.6875rem;font-weight:600;letter-spacing:0.28em;text-transform:uppercase;color:var(--champagne-gold);margin-bottom:1.75rem;padding-bottom:1.25rem;border-bottom:1px solid rgba(201,169,110,0.35)}
.hero-title{font-family:"Playfair Display",serif;font-size:clamp(2.75rem,6vw,5rem);font-weight:700;line-height:1.08;color:var(--ivory);letter-spacing:-0.01em;margin-bottom:1.5rem}
.hero-title em{font-style:italic;color:var(--champagne-gold)}
.hero-subtitle{font-size:1.05rem;font-weight:300;color:rgba(245,240,232,0.75);letter-spacing:0.06em;margin-bottom:2.75rem;line-height:1.65}
.hero-cta{display:inline-block;padding:1rem 2.75rem;border:1px solid var(--champagne-gold);color:var(--champagne-gold);font-size:0.8125rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;transition:all 0.45s var(--ease-out-expo);position:relative;overflow:hidden}
.hero-cta::before{content:"";position:absolute;inset:0;background:var(--champagne-gold);transform:scaleX(0);transform-origin:right;transition:transform 0.45s var(--ease-out-expo);z-index:-1}
.hero-cta:hover{color:var(--deep-brown)}
.hero-cta:hover::before{transform:scaleX(1);transform-origin:left}
.hero-scroll-hint{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;gap:0.5rem;color:rgba(245,240,232,0.5);font-size:0.625rem;letter-spacing:0.2em;text-transform:uppercase;animation:floatDown 2.5s ease-in-out infinite}
@keyframes floatDown{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
.hero-scroll-line{width:1px;height:2.5rem;background:linear-gradient(to bottom,rgba(201,169,110,0.6),transparent)}
.products{padding:7rem 0;background:var(--ivory);position:relative}
.section-header{text-align:center;margin-bottom:4rem}
.section-tag{font-size:0.6875rem;font-weight:600;letter-spacing:0.28em;text-transform:uppercase;color:var(--champagne-gold);margin-bottom:1rem}
.section-title{font-family:"Playfair Display",serif;font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--deep-brown);letter-spacing:-0.01em;line-height:1.15}
.section-line{display:block;width:3rem;height:1px;background:var(--champagne-gold);margin:1.5rem auto 0}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem;max-width:1000px;margin:0 auto}
@media(max-width:640px){.product-grid{grid-template-columns:1fr;max-width:400px}}
.product-card{position:relative;cursor:pointer;transition:transform 0.55s var(--ease-out-expo)}
.product-card:hover{transform:translateY(-6px)}
.product-card-image{position:relative;overflow:hidden;aspect-ratio:1/1;background:var(--warm-cream)}
.product-card-image img{width:100%;height:100%;object-fit:contain;padding:1.5rem;transition:transform 0.7s var(--ease-out-expo)}
.product-card:hover .product-card-image img{transform:scale(1.06)}
.product-card-image::after{content:"";position:absolute;inset:0;border:1px solid transparent;transition:border-color 0.5s ease,inset 0.5s var(--ease-out-expo);pointer-events:none;z-index:2}
.product-card:hover .product-card-image::after{border-color:rgba(201,169,110,0.5);inset:0.5rem}
.product-card-body{padding:1.25rem 0}
.product-card-name{font-family:"Playfair Display",serif;font-size:1.125rem;font-weight:600;color:var(--deep-brown);margin-bottom:0.35rem;letter-spacing:0.02em}
.product-card-desc{font-size:0.8125rem;color:var(--text-soft);font-weight:400}
.product-card-price{font-size:0.9375rem;font-weight:600;color:var(--warm-brown);margin-top:0.5rem;font-family:"Playfair Display",serif}

</style>
</head>
<body>

</style>
</head>
<body>

<nav class="nav" id="navbar">
  <div class="nav-inner">
    <ul class="nav-links left-links">
      <li><a href="white.html">HB001 白</a></li>
      <li><a href="black.html">HB001 黑</a></li>
    </ul>
    <a href="index.html" class="nav-logo">HOARBAUR</a>
    <ul class="nav-links right-links">
      <li><a href="contact.html">联系方式</a></li>
    </ul>
  </div>
</nav>

<section class="hero" id="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content reveal">
    <p class="hero-tag">2026 夏季系列</p>
    <h1 class="hero-title">轻盈步履<br><em>夏日新生</em></h1>
    <p class="hero-subtitle">透气科技与极致轻量，为你的夏日注入自由律动。</p>
    <a href="#products" class="hero-cta">探索系列</a>
  </div>
  <div class="hero-scroll-hint"><span>Scroll</span><div class="hero-scroll-line"></div></div>
</section>

<section class="products" id="products">
  <div class="container">
    <div class="section-header reveal">
      <p class="section-tag">夏季新品</p>
      <h2 class="section-title">焕然一新</h2>
      <span class="section-line"></span>
    </div>
    <div class="product-grid">
      <a href="white.html" class="product-card reveal reveal-delay-1">
        <div class="product-card-image"><img src="images/product-white.jpg" alt="HOARBAUR 白色款" loading="lazy"></div>
        <div class="product-card-body"><h3 class="product-card-name">HB001 — 白</h3><p class="product-card-desc">透气网面 / 轻量EVA中底 / 夏季专属配色</p><p class="product-card-price">¥ 4,999</p></div>
      </a>
      <a href="black.html" class="product-card reveal reveal-delay-2">
        <div class="product-card-image"><img src="images/product-black.jpg" alt="HOARBAUR 黑色款" loading="lazy"></div>
        <div class="product-card-body"><h3 class="product-card-name">HB001 — 黑</h3><p class="product-card-desc">透气网面 / 轻量EVA中底 / 夏季专属配色</p><p class="product-card-price">¥ 4,999</p></div>
      </a>
    </div>
  </div>
</section>


<script>
const navbar=document.getElementById('navbar'),heroBg=document.getElementById('heroBg');
function updateNav(){navbar.classList.toggle('scrolled',window.scrollY>100)}
let ticking=false;
function updateParallax(){if(!ticking){requestAnimationFrame(()=>{heroBg.style.transform=`translate3d(0,${window.pageYOffset*0.35}px,0)`;ticking=false});ticking=true}}
window.addEventListener('scroll',()=>{updateNav();updateParallax()},{passive:true});updateNav();
</script>

<script>
const revealEls=document.querySelectorAll('.reveal');
const obs=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('revealed');obs.unobserve(e.target)}})},{threshold:0.12,rootMargin:'0px 0px -40px 0px'});
revealEls.forEach(el=>obs.observe(el));
</script>

</body>
</html>
